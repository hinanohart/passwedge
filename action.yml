name: "passwedge reliability gate"
description: "Summarize repeated-attempt outcomes (pass@k / pass^k / Bayesian / RDC) and gate a PR on a reliability threshold."
branding:
  icon: "bar-chart-2"
  color: "purple"

inputs:
  input:
    description: "Path to the JSON file of task records."
    required: true
  k:
    description: "Comma-separated k values."
    required: false
    default: "1,2,5"
  main-k:
    description: "Headline k (default: largest k)."
    required: false
    default: ""
  prior:
    description: "Bayesian prior: jeffreys / uniform / paper."
    required: false
    default: "jeffreys"
  metric:
    description: "Metric to gate on: pass_pow_k / pass_at_1 / posterior_mean / ci_lower."
    required: false
    default: "pass_pow_k"
  fail-under:
    description: "Fail the job if the chosen metric is below this value (empty = report only)."
    required: false
    default: ""
  title:
    description: "Report title."
    required: false
    default: "passwedge reliability report"
  comment:
    description: "Upsert the report as a PR comment (requires pull-requests: write)."
    required: false
    default: "true"
  version:
    description: "passwedge version to install."
    required: false
    default: "0.0.1a1"
  python-version:
    description: "Python version to set up."
    required: false
    default: "3.12"

outputs:
  passed:
    description: "true if the gated metric met the threshold."
    value: ${{ steps.report.outputs.passed }}
  pass_pow_k:
    description: "Headline pass^k."
    value: ${{ steps.report.outputs.pass_pow_k }}
  posterior_mean:
    description: "Pooled Bayesian posterior mean."
    value: ${{ steps.report.outputs.posterior_mean }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      run: python -m pip install "passwedge==${{ inputs.version }}"
    - id: report
      shell: bash
      run: |
        args=(ci --input "${{ inputs.input }}" --k "${{ inputs.k }}" \
              --prior "${{ inputs.prior }}" --metric "${{ inputs.metric }}" \
              --title "${{ inputs.title }}" --output passwedge-report.md --github-output)
        if [ -n "${{ inputs.main-k }}" ]; then args+=(--main-k "${{ inputs.main-k }}"); fi
        if [ -n "${{ inputs.fail-under }}" ]; then args+=(--fail-under "${{ inputs.fail-under }}"); fi
        set +e
        passwedge "${args[@]}"
        rc=$?
        set -e
        echo "rc=$rc" >> "$GITHUB_OUTPUT"
        echo "passwedge exited with code $rc"
    - if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- passwedge-report -->';
          const body = fs.readFileSync('passwedge-report.md', 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
    - shell: bash
      run: |
        # Fail closed. A usage error (rc>=2) fails here; a runtime crash (rc=1, no
        # passed= written) or a gate failure leaves passed != "true" and fails below.
        if [ "${{ steps.report.outputs.rc }}" -ge 2 ]; then
          echo "::error::passwedge usage error (exit ${{ steps.report.outputs.rc }})"
          exit 1
        fi
        if [ "${{ steps.report.outputs.passed }}" != "true" ]; then
          echo "::error::passwedge reliability gate failed (${{ inputs.metric }} < ${{ inputs.fail-under }})"
          exit 1
        fi
        echo "passwedge reliability gate passed"
